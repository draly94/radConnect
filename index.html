<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title ar="رادكونكت - تسجيل الدخول">RadConnect - Login</title>
            <script>
        (function() {
            // Load theme
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') {
                document.querySelector('meta[name="theme-color"]').content = '#1a1a2e';
            }
            
            // Load language
            const lang = localStorage.getItem('lang') || 'en';
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.lang = lang;
            
            // Store current lang for the toggle button text
            window.__initialLang = lang;
        })();
    </script>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/rtl.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 ar="رادكونكت">RadConnect</h1>
            <p ar="منصة التصوير الطبي">Medical Imaging Platform</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" ar="البريد الإلكتروني">Email</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password" ar="كلمة المرور">Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                
                <div id="errorMsg" class="error-message"></div>
                
                <button type="submit" class="btn btn-primary btn-block btn-lg" ar="تسجيل الدخول">
                    Sign In
                </button>
            </form>
            
            <p class="auth-switch">
                <span ar="ليس لديك حساب؟">Don't have an account?</span>
                <a href="signup.html" ar="إنشاء حساب">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
         translatePage();
        loadLang();
        document.body.classList.add('translated');
  
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.classList.remove('show');
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    await login(email, password);
                    window.location.href = CONFIG.DASHBOARD_PAGE;
                } catch (error) {
                    errorMsg.textContent = error.message;
                    errorMsg.classList.add('show');
                }
            });
        });
    </script>
</body>
</html>

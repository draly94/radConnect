<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>

            <script>
        (function() {
            // Load theme
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') {
                document.querySelector('meta[name="theme-color"]').content = '#1a1a2e';
            }
            
            // Load language
            const lang = localStorage.getItem('lang') || 'en';
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.documentElement.lang = lang;
            
            // Store current lang for the toggle button text
            window.__initialLang = lang;
        })();
    </script>

<script>
    let targetUser = null;
    let allCases = [];
    let selectedCases = new Set();
    
    document.addEventListener('DOMContentLoaded', async () => {
        const user = await checkAuth();
        if (!user) return;
        if (!isAdmin()) { window.location.href = '../dashboard.html'; return; }
        
        translatePage();
        loadLang();
        document.body.classList.add('translated');
          
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        if (!userId) { window.location.href = 'users.html'; return; }
        
        await loadUserData(userId);
        await loadCases();
        await loadPaymentHistory();
        
        document.getElementById('paymentForm').addEventListener('submit', handlePayment);
    });
    
    async function loadUserData(userId) {
        const users = await getUsers();
        targetUser = users.find(u => u.id === userId);
        if (!targetUser) return;
        
        document.getElementById('userName').textContent = targetUser.full_name;
        document.getElementById('userFullName').textContent = targetUser.full_name;
        document.getElementById('userRole').textContent = targetUser.role;
        
        const balance = await getUserWalletBalance(userId);
        const badge = document.getElementById('balanceBadge');
        badge.textContent = formatCurrency(Math.abs(balance.net_balance));
        
        if (targetUser.role === 'service_provider') {
            badge.className = `badge ${balance.net_balance < 0 ? 'badge-rejected' : 'badge-completed'}`;
        } else {
            badge.className = `badge ${balance.net_balance > 0 ? 'badge-pending' : 'badge-completed'}`;
        }
    }
    
    async function loadCases() {
        const statusFilter = document.getElementById('statusFilter').value;
        allCases = await getUserCases(targetUser.id, targetUser.role, statusFilter);
        renderCases();
    }
    
    function renderCases() {
        const statusFilter = document.getElementById('statusFilter').value;
        const tbody = document.getElementById('casesTableBody');
        
        let filtered = allCases;
        if (statusFilter === 'unsettled') {
            filtered = allCases.filter(c => {
                const paid = getCasePaidAmount(c);
                return paid < (c.price || 0);
            });
        } else if (statusFilter === 'settled') {
            filtered = allCases.filter(c => {
                const paid = getCasePaidAmount(c);
                return paid >= (c.price || 0);
            });
        }
        
        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p ar="لا توجد حالات">No cases found</p></div></td></tr>`;
            updateTotals();
            translatePage();
            return;
        }
        
        tbody.innerHTML = filtered.map(c => {
            const paid = getCasePaidAmount(c);
            const remaining = (c.price || 0) - paid;
            const isSettled = remaining <= 0;
            
            return `
                <tr>
                    <td>
                        <input type="checkbox" 
                            value="${c.id}" 
                            ${isSettled ? 'disabled' : ''}
                            ${selectedCases.has(c.id) ? 'checked' : ''}
                            onchange="toggleCase('${c.id}', this.checked)">
                    </td>
                    <td>Case #${c.case_number}</td>
                    <td>${formatCurrency(c.price)}</td>
                    <td>${formatCurrency(paid)}</td>
                    <td style="color: ${remaining > 0 ? 'var(--danger)' : 'var(--success)'}">
                        ${formatCurrency(Math.abs(remaining))}
                    </td>
                    <td>
                        <span class="badge ${isSettled ? 'badge-completed' : 'badge-pending'}">
                            ${isSettled ? 'Settled' : 'Unsettled'}
                        </span>
                    </td>
                    <td>${formatDate(c.completed_at)}</td>
                </tr>
            `;
        }).join('');
        
        updateTotals();
        translatePage();
    }
    
    function toggleCase(caseId, checked) {
        if (checked) {
            selectedCases.add(caseId);
        } else {
            selectedCases.delete(caseId);
        }
        updateTotals();
    }
    
    function toggleSelectAll() {
        const checkAll = document.getElementById('selectAll').checked;
        const checkboxes = document.querySelectorAll('#casesTableBody input[type="checkbox"]:not([disabled])');
        
        checkboxes.forEach(cb => {
            cb.checked = checkAll;
            if (checkAll) {
                selectedCases.add(cb.value);
            } else {
                selectedCases.delete(cb.value);
            }
        });
        updateTotals();
    }
    
    function updateTotals() {
        const selected = allCases.filter(c => selectedCases.has(c.id));
        const total = selected.reduce((sum, c) => sum + (c.price || 0), 0);
        const paid = selected.reduce((sum, c) => sum + getCasePaidAmount(c), 0);
        
        document.getElementById('selectedInfo').textContent = 
            `${selectedCases.size} case(s) selected`;
        document.getElementById('totalAmount').textContent = 
            `Total: ${formatCurrency(total)} | Paid: ${formatCurrency(paid)} | Due: ${formatCurrency(total - paid)}`;
    }

    function showPaymentModal() {
        const selected = allCases.filter(c => selectedCases.has(c.id));
        if (selected.length === 0) {
            showToast('Select at least one case', 'warning');
            return;
        }
        
        const total = selected.reduce((sum, c) => sum + (c.price || 0), 0);
        const paid = selected.reduce((sum, c) => sum + getCasePaidAmount(c), 0);
        const due = total - paid;
        
        document.getElementById('selectedCasesList').innerHTML = `
            <p><strong>${selected.length} case(s)</strong></p>
            <p>Total: ${formatCurrency(total)} | Paid: ${formatCurrency(paid)}</p>
            <p>Amount Due: <strong>${formatCurrency(due)}</strong></p>
        `;
        
        document.getElementById('paymentAmount').value = due;
        document.getElementById('paymentAmount').max = due;
        
        showModal('paymentModal');
    }
    
    async function handlePayment(e) {
        e.preventDefault();
        
        const amount = parseFloat(document.getElementById('paymentAmount').value);
        const notes = document.getElementById('paymentNotes').value;
        const selected = allCases.filter(c => selectedCases.has(c.id));
        
        if (amount <= 0) {
            showToast('Enter valid amount', 'error');
            return;
        }
        
        selected.sort((a, b) => new Date(a.completed_at) - new Date(b.completed_at));
        
        let remaining = amount;
        
        for (const caseItem of selected) {
            if (remaining <= 0) break;
            
            const casePaid = getCasePaidAmount(caseItem);
            const caseDue = (caseItem.price || 0) - casePaid;
            const payAmount = Math.min(remaining, caseDue);
            
            if (payAmount > 0) {
                const type = targetUser.role === 'service_provider' ? 'payment_from_sp' : 'payment_to_radiologist';
                const fromId = targetUser.role === 'service_provider' ? targetUser.id : currentUser.id;
                const toId = targetUser.role === 'service_provider' ? currentUser.id : targetUser.id;
                
                await recordPayment(caseItem.id, fromId, toId, payAmount, type, notes);
                remaining -= payAmount;
            }
        }
        
        hideModal('paymentModal');
        showToast('Payment recorded!', 'success');
        
        selectedCases.clear();
        await loadCases();
        await loadPaymentHistory();
    }
    
    async function loadPaymentHistory() {
        const transactions = await getUserTransactions(targetUser.id);
        
        const container = document.getElementById('paymentHistory');
        
        if (!transactions || transactions.length === 0) {
            container.innerHTML = '<div class="empty-state"><p ar="لا توجد مدفوعات">No payments yet</p></div>';
            return;
        }
        
        container.innerHTML = transactions.map(t => {
            const isCredit = t.to_user_id === targetUser.id;
            return `
                <div class="transaction-item">
                    <div>
                        <strong>${t.cases?.case_number ? `Case #${t.cases.case_number}` : 'Manual'}</strong>
                        <div class="text-sm text-muted">${t.notes || t.type}</div>
                        <div class="text-sm text-muted">${formatDate(t.created_at)}</div>
                    </div>
                    <div class="transaction-amount ${isCredit ? 'positive' : 'negative'}">
                        ${isCredit ? '+' : '-'}${formatCurrency(t.amount)}
                    </div>
                </div>
            `;
        }).join('');
        
        translatePage();
    }
</script>
